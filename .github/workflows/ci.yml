# CI ワークフロー
#
# Node.js / npm プロジェクト向けの標準 CI パイプラインです。

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: 依存関係のインストール
        run: npm ci
      - name: Lint
        run: npm run lint

  typecheck:
    name: Type check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: 依存関係のインストール
        run: npm ci
      - name: 型チェック
        run: npm run type-check

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: 依存関係のインストール
        run: npm ci
      - name: test プレースホルダー
        run: echo "TODO: test コマンドを設定してください"

  build:
    name: Build
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: 依存関係のインストール
        run: npm ci
      - name: ビルド
        run: npm run build
        env:
          NODE_ENV: production
