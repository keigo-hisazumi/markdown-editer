# GitHub Pages デプロイワークフロー
#
# main ブランチへのマージ時に自動デプロイします。

name: Deploy to GitHub Pages

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: 依存関係のインストール
        run: npm ci
      - name: ビルド
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /markdown-editer/
          VITE_APP_ENV: production
      - name: GitHub Pages へのデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          exclude_assets: 'pr-*'
