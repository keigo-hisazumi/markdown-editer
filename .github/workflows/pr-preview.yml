# PR プレビューワークフロー（テンプレート）
#
# PR ごとに gh-pages ブランチへプレビュー環境をデプロイし、
# PR コメントにプレビュー URL と QR コードを自動投稿します。
# PR クローズ時はプレビューディレクトリを自動削除します。
#
# 実プロジェクトに合わせて以下を確認してください:
#   - ベースパスの環境変数名（VITE_BASE_PATH など）
#   - ビルドコマンド（npm run build など）
#   - publish_dir（ビルド出力ディレクトリ）

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係のインストール
        run: npm ci

      # TODO: フレームワークに合わせてベースパスの変数名を変更してください
      - name: PR ブランチ用ベースパスでビルド
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/pr-${{ github.event.number }}/
          VITE_APP_ENV: preview
        run: npm run build

      - name: gh-pages への PR プレビューのデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.number }}
          keep_files: true

      - name: プレビュー URL のコメント投稿
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const previewUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}/`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(previewUrl)}`;
            const marker = '<!-- pr-preview -->';
            const body = [
              marker,
              '## プレビュー環境 🚀',
              '',
              `| | |`,
              `|---|---|`,
              `| **プレビューURL** | [${previewUrl}](${previewUrl}) |`,
              `| **コミット** | \`${context.sha.slice(0, 7)}\` |`,
              `| **QRコード** | ![](${qrUrl}) |`,
              '',
              '*コードをプッシュするたびに自動更新されます。*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gh-pages からプレビューディレクトリを削除
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git ls-remote --exit-code origin gh-pages; then
            echo "gh-pages ブランチが存在しないため、クリーンアップをスキップします"
            exit 0
          fi

          git fetch origin gh-pages
          git checkout gh-pages

          if [ -d "pr-${{ github.event.number }}" ]; then
            git rm -rf "pr-${{ github.event.number }}"
            git commit -m "chore: PR #${{ github.event.number }} のプレビューを削除"
            git push origin gh-pages
          else
            echo "プレビューディレクトリ pr-${{ github.event.number }} が見つかりません、スキップします"
          fi
